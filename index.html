<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>自分用家計簿</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4CAF50">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h1>📝家計簿📝</h1>

  <!-- ホーム画面 -->
  <div id="homeView" class="view active">
    <div>
      <input type="month" id="monthSelector">
    </div>

    <div id="summary">
      <p>収入：¥<span id="incomeTotal">0</span></p>
      <p>支出：¥<span id="expenseTotal">0</span></p>
      <p><strong>差額：¥<span id="balance">0</span></strong></p>
    </div>

    <div>
      <input type="date" id="date">
      <input type="number" id="amount" placeholder="金額">
      <select id="type">
        <option value="expense">支出</option>
        <option value="income">収入</option>
      </select>
      <select id="category"></select>
      <button id="addButton">追加</button>
    </div>

    <ul id="list"></ul>
  </div>

  <!-- カレンダー画面 -->
  <div id="calendarView" class="view">
    <h2>日別カレンダー</h2>
    <div class="week-header">
      <div>日</div><div>月</div><div>火</div><div>水</div>
      <div>木</div><div>金</div><div>土</div>
    </div>
    <div id="calendar"></div>
    <div id="dayDetail"></div>
  </div>

  <!-- カテゴリ管理画面 -->
  <div id="categoryView" class="view">
    <h2>カテゴリ管理</h2>

    <div class="category-add-form">
      <input type="text" id="newCategoryName" placeholder="カテゴリ名">
      <select id="newCategoryType">
        <option value="expense">支出</option>
        <option value="income">収入</option>
        <option value="both">両方</option>
      </select>
      <button id="addCategoryButton">追加</button>
    </div>

    <h3>支出カテゴリ</h3>
    <ul id="expenseCategoryList" class="category-list"></ul>

    <h3>収入カテゴリ</h3>
    <ul id="incomeCategoryList" class="category-list"></ul>
  </div>

  <!-- 下部固定タブ -->
  <nav class="tab-bar">
    <button id="homeTab" class="tab active">🏠 ホーム</button>
    <button id="calendarTab" class="tab">📅 カレンダー</button>
    <button id="categoryTab" class="tab">🏷️ カテゴリ</button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
